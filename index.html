<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>estatebasics — property tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface-alt: #f2f2ef;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.13);
      --text-primary: #1a1a18;
      --text-secondary: #5a5a56;
      --text-muted: #9a9a94;
      --accent: #1a1a18;
      --accent-bg: #f0f0ec;
      --radius: 8px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 0 0 3rem;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.4rem 1.5rem 0;
      margin-bottom: 2.25rem;
    }

    .wordmark-main {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      line-height: 1;
    }
    .wordmark-main span { color: var(--text-muted); font-weight: 300; }

    .wordmark-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.13em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 3px;
    }

    .gear-btn {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 0.5px solid var(--border-strong);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-size: 16px;
      transition: background 0.12s, color 0.12s;
    }
    .gear-btn:hover { background: var(--surface); color: var(--text-primary); }
    .gear-btn.active { background: var(--surface); color: var(--text-primary); }

    /* HERO */
    .hero {
      padding: 0 1.5rem 1.75rem;
      border-bottom: 0.5px solid var(--border-strong);
      margin-bottom: 1.75rem;
    }
    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.55rem;
    }
    .hero-title {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      line-height: 1.15;
      margin-bottom: 0.45rem;
    }
    .hero-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      font-weight: 300;
    }

    /* LINK STACK */
    .link-stack {
      margin: 0 1.5rem;
      border: 0.5px solid var(--border-strong);
      border-radius: 12px;
      overflow: hidden;
      background: var(--surface);
    }

    .link-row {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 0.9rem 1.1rem;
      text-decoration: none;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .link-row:last-child { border-bottom: none; }
    .link-row:hover { background: var(--accent-bg); }
    .link-row:active { background: #e8e8e4; }

    .link-icon-wrap {
      width: 38px; height: 38px;
      border-radius: 9px;
      background: var(--surface-alt);
      border: 0.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      color: var(--text-secondary);
      transition: color 0.1s, background 0.1s, border-color 0.1s;
    }
    .link-row:hover .link-icon-wrap {
      color: var(--text-primary);
      background: #e4e4e0;
      border-color: rgba(0,0,0,0.18);
    }

    .link-text { flex: 1; min-width: 0; }
    .link-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-domain {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .link-arrow {
      font-size: 15px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* EDIT PANEL */
    .edit-section {
      margin: 1.75rem 1.5rem 0;
      display: none;
    }
    .edit-section.open { display: block; }

    .edit-card {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      border-radius: 12px;
      overflow: hidden;
    }

    .edit-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.85rem 1.1rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface-alt);
    }
    .edit-card-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    .edit-hint {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .edit-rows { padding: 0.4rem 0; }

    .edit-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.5rem 1.1rem;
      border-bottom: 0.5px solid var(--border);
    }
    .edit-item:last-child { border-bottom: none; }

    .edit-inputs { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
    .edit-inputs input {
      width: 100%;
      font-size: 12px;
      padding: 5px 9px;
      height: 30px;
      border-radius: 6px;
      border: 0.5px solid var(--border-strong);
      background: var(--surface-alt);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.1s, background 0.1s;
    }
    .edit-inputs input.mono {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-secondary);
    }
    .edit-inputs input:focus {
      border-color: rgba(0,0,0,0.3);
      background: #fff;
    }

    .del-btn {
      width: 28px; height: 28px;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      font-size: 14px;
      flex-shrink: 0;
      transition: color 0.1s, border-color 0.1s, background 0.1s;
    }
    .del-btn:hover { color: #c0392b; border-color: #f0c0bc; background: #fdf0ef; }

    .edit-footer {
      padding: 0.85rem 1.1rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--surface-alt);
    }

    .add-btn {
      width: 100%;
      padding: 7px;
      background: transparent;
      border: 0.5px dashed var(--border-strong);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: center; gap: 5px;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.1s;
    }
    .add-btn:hover { background: var(--bg); }

    .save-btn {
      width: 100%;
      padding: 9px;
      background: var(--text-primary);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.12s;
    }
    .save-btn:hover { opacity: 0.78; }

    .save-note {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }
    .save-note.success { color: #27ae60; }
    .save-note.error { color: #c0392b; }

    /* FOOTER */
    .page-footer {
      margin-top: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .footer-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--border-strong);
    }
    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div>
      <div class="wordmark-main">estate<span>basics</span></div>
      <div class="wordmark-tag">property tools</div>
    </div>
    <button class="gear-btn" id="gearBtn" onclick="toggleEdit()" aria-label="manage links">
      <i class="ti ti-settings" aria-hidden="true"></i>
    </button>
  </div>

  <div class="hero">
    <div class="hero-label">quick access</div>
    <div class="hero-title">Your tools,<br>one tap away.</div>
    <div class="hero-sub">Calculators and resources for every client conversation.</div>
  </div>

  <div class="link-stack" id="linkStack">
    <div style="padding:2rem;text-align:center;font-size:13px;color:var(--text-muted);">Loading...</div>
  </div>

  <div class="edit-section" id="editSection">
    <div class="edit-card">
      <div class="edit-card-header">
        <div class="edit-card-title">manage links</div>
        <div class="edit-hint">edit links.json to update</div>
      </div>
      <div class="edit-rows" id="editRows"></div>
      <div class="edit-footer">
        <button class="add-btn" onclick="addRow()">
          <i class="ti ti-plus" aria-hidden="true"></i> add link
        </button>
        <button class="save-btn" onclick="copyJson()">
          <i class="ti ti-copy" aria-hidden="true"></i> copy links.json content
        </button>
        <div class="save-note" id="saveNote">copy the JSON, then paste it into links.json on GitHub</div>
      </div>
    </div>
  </div>

  <div class="page-footer">
    <div class="footer-dot"></div>
    <div class="footer-text">estatebasics.sg</div>
    <div class="footer-dot"></div>
  </div>

  <script>
    const ICON_GUESS = (label) => {
      const l = label.toLowerCase();
      if (l.includes('calc')) return 'ti-calculator';
      if (l.includes('hdb')) return 'ti-building-estate';
      if (l.includes('condo') || l.includes('private')) return 'ti-building-skyscraper';
      if (l.includes('instagram') || l.includes('ig')) return 'ti-brand-instagram';
      if (l.includes('whatsapp')) return 'ti-brand-whatsapp';
      if (l.includes('tiktok')) return 'ti-brand-tiktok';
      if (l.includes('pdf') || l.includes('form') || l.includes('doc')) return 'ti-file-description';
      if (l.includes('map') || l.includes('location')) return 'ti-map-pin';
      return 'ti-link';
    };

    const hostname = (url) => {
      try { return new URL(url).hostname.replace('www.', ''); } catch { return url; }
    };

    let links = [];
    let editOpen = false;

    // Load links.json from the same repo
    fetch('links.json')
      .then(r => r.json())
      .then(data => { links = data; renderLinks(); })
      .catch(() => {
        document.getElementById('linkStack').innerHTML =
          '<div style="padding:1.5rem;text-align:center;font-size:13px;color:var(--text-muted);">Could not load links.json</div>';
      });

    function renderLinks() {
      const stack = document.getElementById('linkStack');
      stack.innerHTML = '';
      links.forEach(l => {
        const a = document.createElement('a');
        a.className = 'link-row';
        a.href = l.url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.innerHTML = `
          <div class="link-icon-wrap"><i class="ti ${l.icon || ICON_GUESS(l.label)}" aria-hidden="true"></i></div>
          <div class="link-text">
            <div class="link-name">${l.label}</div>
            <div class="link-domain">${hostname(l.url)}</div>
          </div>
          <i class="ti ti-arrow-up-right link-arrow" aria-hidden="true"></i>
        `;
        stack.appendChild(a);
      });
    }

    function renderEditRows() {
      const rows = document.getElementById('editRows');
      rows.innerHTML = '';
      links.forEach((l, i) => {
        const d = document.createElement('div');
        d.className = 'edit-item';
        d.innerHTML = `
          <div class="edit-inputs">
            <input type="text" value="${l.label}" placeholder="label"
              onchange="links[${i}].label=this.value; links[${i}].icon=ICON_GUESS(this.value)" />
            <input class="mono" type="url" value="${l.url}" placeholder="https://"
              onchange="links[${i}].url=this.value" />
          </div>
          <button class="del-btn" onclick="removeRow(${i})" aria-label="remove link">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        `;
        rows.appendChild(d);
      });
    }

    function toggleEdit() {
      editOpen = !editOpen;
      document.getElementById('editSection').classList.toggle('open', editOpen);
      document.getElementById('gearBtn').classList.toggle('active', editOpen);
      if (editOpen) renderEditRows();
    }

    function addRow() {
      links.push({ label: '', url: '', icon: 'ti-link' });
      renderEditRows();
    }

    function removeRow(i) {
      links.splice(i, 1);
      renderEditRows();
      renderLinks();
    }

    function copyJson() {
      const json = JSON.stringify(links, null, 2);
      navigator.clipboard.writeText(json).then(() => {
        const note = document.getElementById('saveNote');
        note.textContent = 'copied! now paste into links.json on GitHub and commit.';
        note.className = 'save-note success';
        setTimeout(() => {
          note.textContent = 'copy the JSON, then paste it into links.json on GitHub';
          note.className = 'save-note';
        }, 3500);
      }).catch(() => {
        const note = document.getElementById('saveNote');
        note.textContent = 'could not copy — try a different browser';
        note.className = 'save-note error';
      });
    }
  </script>
</body>
</html>
